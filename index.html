<!DOCTYPE html>
<html>
<head>
<title>Talking Rabbitt</title>
<style>
body{font-family:Arial;text-align:center;padding:40px}
input,button{padding:10px;margin:10px}
</style>
</head>

<body>

<h1>Talking Rabbitt 🐰</h1>
<p>Conversational Analytics Demo</p>

<input type="file" id="csvFile">
<br>

<input type="text" id="question" placeholder="Ask your question">
<button onclick="analyze()">Ask</button>

<h3 id="result"></h3>

<script>
function analyze(){
let q=document.getElementById("question").value.toLowerCase()

if(q.includes("highest revenue")){
document.getElementById("result").innerText=
"South region has the highest revenue."
}else{
document.getElementById("result").innerText=
"Demo answer generated by Talking Rabbitt."
}
}
</script>

</body>
</html>
